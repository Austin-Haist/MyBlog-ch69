<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="flexbox.css">
    <title>Document</title>
</head>
<body>
    <h1>Flexbox</h1>

   <h2>flex-start</h2>
    <div class="container-flex-start">
        <p>child-1</p>
        <p>child-2</p>
    </div>

    <h2>flex-end</h2>
    <div class="container-flex-end">
        <p>child-1</p>
        <p>child-2</p>
    </div>

    <h2>center</h2>
    <div class="container-flex-center">
        <p>child-1</p>
        <p>child-2</p>
    </div>

    <h2>space-between</h2>
    <div class="container-between">
        <p>child-1</p>
        <p>child-2</p>
    </div> 

    <h2>space-around</h2>
    <div class="container-around">
        <p>child-1</p>
        <p>child-2</p>
    </div> 

    <h2>space-evenly</h2>
    <div class="container-evenly">
        <p>child-1</p>
        <p>child-2</p>
    </div> 

</body>
</html>
