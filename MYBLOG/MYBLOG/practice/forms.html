<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="forms.css">
    <title>Document</title>
</head>
<body>
    <div class="form-container">
        <!--Block-->
        <h2>Contact form example</h2>
        <p>This is information for the users</p>
        <form>
            <div class="input-container">
                <!--inline-->
                <label>Name:</label>
                <input type="text" placeholder="Enter the name" id="txtName" name="user_name">
            </div>

            <div class="input-container">
                <label>Age:</label>
                <input type="number" value="5">
            </div>

            <div class="input-container"
                <label>Password:</label>
                <input type="password" name="user_password">
            </div>

            <div class="input-container"
                <label>Message</label>
                <textarea></textarea>
            </div>

            <button>Send</button>

        </form>
    </div>

</body>
</html>
